services:
  - type: web
    name: least-score
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: least-score-db
          property: connectionString

databases:
  - name: least-score-db
    plan: free
    databaseName: leastscore
    postgresMajorVersion: 16
