name: least-score

services:
  - name: web
    type: web
    instance_type: free
    ports:
      - port: 8080
    routes:
      - path: /
    healthcheck:
      path: /actuator/health
    env:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: ALLOWED_ORIGINS
        value: "*"
