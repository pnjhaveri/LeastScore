server.port=${PORT:8080}

# Railway/managed platforms typically provide DATABASE_URL-style or individual vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# Cookies should be Secure in production behind HTTPS.
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# Comma-separated list. Example: https://leastscore.example.com
leastscore.allowed-origins=${ALLOWED_ORIGINS:*}
