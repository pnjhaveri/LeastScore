spring.application.name=LeastScore

# --- Server ---
server.port=${PORT:8080}

# --- Datasource (local defaults; override in production via env vars) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/leastscore}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:leastscore}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:leastscore}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}

# --- JPA / Flyway ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized

# --- Logging ---
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.socket=INFO
